name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: |
          dotnet restore GitNanny.slnx
          dotnet restore GitNanny/GitNanny.csproj -r win-x64

      - name: Build
        run: dotnet build GitNanny.slnx --no-restore -c Release

      - name: Test
        run: dotnet test GitNanny.slnx --no-restore --no-build -c Release

      - name: Publish (win-x64 self-contained)
        run: dotnet publish GitNanny/GitNanny.csproj -r win-x64 --self-contained -c Release --no-restore -o publish/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: GitNanny-win-x64
          path: publish/
          if-no-files-found: error
